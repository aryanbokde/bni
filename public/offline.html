<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Offline — BNI Connect</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background-color: #1B2A4A;
      color: #ffffff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      text-align: center;
      padding: 2rem;
    }
    h1 {
      color: #2E75B6;
      font-size: 2rem;
      margin-bottom: 1rem;
    }
    p {
      font-size: 1.1rem;
      line-height: 1.6;
      max-width: 400px;
      margin-bottom: 2rem;
      opacity: 0.9;
    }
    button {
      background-color: #2E75B6;
      color: #ffffff;
      border: none;
      padding: 0.75rem 2rem;
      font-size: 1rem;
      border-radius: 8px;
      cursor: pointer;
      transition: background-color 0.2s;
    }
    button:hover {
      background-color: #3a8ad4;
    }
  </style>
</head>
<body>
  <h1>BNI Connect</h1>
  <p>You are offline. Your member list is still available from cache.</p>
  <button onclick="location.reload()">Try Again</button>
</body>
</html>
